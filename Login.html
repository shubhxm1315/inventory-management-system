<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CoreInventory Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
background:#f0f4ff;
font-family:'DM Sans',sans-serif;
color:#0f1f4b;
min-height:100vh;
}

.ci-root{
min-height:100vh;
display:flex;
position:relative;
overflow:hidden;
}

/* LEFT PANEL */

.ci-left{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
padding:60px 64px;
background:linear-gradient(145deg,#1a3faa,#1557f0,#2979ff);
color:white;
}

.ci-logo{
display:flex;
align-items:center;
gap:12px;
margin-bottom:64px;
}

.ci-logo-icon{
width:40px;
height:40px;
background:rgba(255,255,255,0.2);
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
}

.ci-logo-name{
font-family:'Syne';
font-size:22px;
font-weight:800;
}

.ci-headline{
font-family:'Syne';
font-size:48px;
font-weight:800;
margin-bottom:22px;
}

.ci-desc{
font-size:14px;
opacity:.8;
max-width:360px;
margin-bottom:40px;
}

/* NEW BUTTONS */

.ci-actions{
display:flex;
gap:15px;
margin-top:20px;
}

.ci-action-btn{
padding:12px 20px;
border:none;
border-radius:8px;
font-family:'Syne';
font-weight:700;
cursor:pointer;
}

.login-btn{
background:white;
color:#1557f0;
}

.signup-btn{
background:#0f1f4b;
color:white;
}

/* RIGHT PANEL */

.ci-right{
width:460px;
display:flex;
align-items:center;
justify-content:center;
padding:40px;
}

.ci-panel{
background:white;
border-radius:20px;
padding:38px;
width:100%;
box-shadow:0 4px 32px rgba(0,0,0,.08);
}

.ci-panel-title{
font-family:'Syne';
font-size:24px;
font-weight:700;
margin-bottom:6px;
}

.ci-panel-sub{
font-size:13px;
color:#6b7ea8;
margin-bottom:30px;
}

.ci-field{
margin-bottom:18px;
}

.ci-label{
font-size:11px;
font-weight:500;
margin-bottom:8px;
display:block;
}

.ci-input{
width:100%;
padding:13px;
border-radius:10px;
border:1px solid #dde6ff;
background:#f5f7ff;
}

.ci-error{
font-size:11px;
color:red;
margin-top:6px;
}

.ci-btn{
width:100%;
padding:14px;
border:none;
border-radius:11px;
background:linear-gradient(135deg,#1a3faa,#1557f0);
color:white;
font-family:'Syne';
font-size:15px;
font-weight:700;
cursor:pointer;
}

.forgot{
font-size:12px;
color:#1557f0;
cursor:pointer;
margin-bottom:10px;
display:block;
}

.toggle{
position:absolute;
right:10px;
top:10px;
cursor:pointer;
font-size:12px;
color:#1557f0;
}

.hidden{
display:none;
}

.ci-toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:white;
padding:12px 20px;
border-radius:10px;
box-shadow:0 4px 20px rgba(0,0,0,0.12);
display:none;
}

</style>

</head>

<body>

<div class="ci-root">

<!-- LEFT PANEL -->

<div class="ci-left">

<div class="ci-logo">

<div class="ci-logo-icon">

<svg width="20" height="20">
<rect x="2" y="2" width="7" height="7" fill="white"/>
<rect x="11" y="2" width="7" height="7" fill="white" opacity="0.6"/>
<rect x="2" y="11" width="7" height="7" fill="white" opacity="0.6"/>
<rect x="11" y="11" width="7" height="7" fill="white" opacity="0.3"/>
</svg>

</div>

<div class="ci-logo-name">CoreInventory</div>

</div>

<h1 class="ci-headline">
Stock smarter,<br>not harder
</h1>

<p class="ci-desc">
Centralize receipts, deliveries, transfers and inventory in one real-time system.
</p>

<div class="ci-actions">

<button class="ci-action-btn login-btn" onclick="showLogin()">Login</button>

<button class="ci-action-btn signup-btn" onclick="showSignup()">Create Account</button>

</div>

</div>


<!-- RIGHT PANEL -->

<div class="ci-right">

<div class="ci-panel">

<!-- LOGIN FORM -->

<form id="loginForm">

<div class="ci-panel-title">Welcome back</div>
<div class="ci-panel-sub">Sign in to your inventory dashboard</div>

<div class="ci-field">
<label class="ci-label">Email</label>
<input id="email" class="ci-input" type="email" placeholder="Enter your email">
<div id="emailError" class="ci-error"></div>
</div>

<div class="ci-field">
<label class="ci-label">Password</label>
<input id="password" class="ci-input" type="password" placeholder="Enter your password">
<div id="passwordError" class="ci-error"></div>
</div>

<span class="forgot" onclick="forgotPassword()">Forgot Password?</span>
<button type="button" class="ci-btn" onclick="openClaude()">Login</button></form>


<!-- SIGNUP FORM -->

<form id="signupForm" class="hidden">

<div class="ci-panel-title">Create Account</div>

<div class="ci-field">
<label class="ci-label">Full Name</label>
<input class="ci-input" type="text" placeholder="Enter your full name">
</div>

<div class="ci-field">
<label class="ci-label">Email</label>
<input class="ci-input" type="email" placeholder="Enter your email">
</div>

<div class="ci-field">
<label class="ci-label">Password</label>
<input class="ci-input" type="password" placeholder="Enter your password">
</div>

<button type="button" class="ci-btn" onclick="openClaude()">Create Account</button>
</form>

</div>

</div>

</div>


<div id="toast" class="ci-toast">Success</div>

<script>

function showSignup(){
document.getElementById("loginForm").classList.add("hidden")
document.getElementById("signupForm").classList.remove("hidden")
}

function showLogin(){
document.getElementById("signupForm").classList.add("hidden")
document.getElementById("loginForm").classList.remove("hidden")
}

async function openClaude(){

const email=document.getElementById("email").value.trim()
const password=document.getElementById("password").value.trim()

if(!email || !password){
alert("Please enter email and password")
return
}

let res

try{

res=await fetch("http://localhost:8080/api/auth/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email,password})
})

}catch(e){

alert("Server not reachable")
return

}

const data=await res.json()

if(data.success){

localStorage.setItem("token",data.data.token)

window.location.href="claude.html"

}else{

alert(data.message)


}

}

function forgotPassword(){

const email = prompt("Enter your registered email")

if(!email){
alert("Please enter email")
return
}

fetch("http://localhost:8080/api/auth/forgot-password",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email:email})
})
.then(res=>res.json())
.then(data=>{
alert(data.message)
})
.catch(()=>{
alert("Server error")
})

}


</script>
</body>
</html>
